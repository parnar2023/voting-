<!DOCTYPE html>
<html>
<head>
  <title>Voting</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #9DE0AD;
      color: #594F4F;
      padding: 20px;
    }
    h1, h2 { text-align: center; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #547980;
      color: #E5FCC2;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      background: #45ADA8;
      color: #594F4F;
      font-weight: bold;
    }
    .btn:hover { background: #E5FCC2; }
    .section {
      background: #F7FFF0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #E5FCC2;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    #candidates button {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 6px auto;
      padding: 10px;
      font-size: 16px;
    }
    #publicResults {
      text-align: center;
      margin-top: 10px;
    }
    canvas {
      max-width: 400px;
      max-height: 200px;
      margin: 10px auto;
      display: none;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, get, set, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
      authDomain: "website-f6d0f.firebaseapp.com",
      databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "website-f6d0f",
      storageBucket: "website-f6d0f.appspot.com",
      messagingSenderId: "800099865387",
      appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
      measurementId: "G-G8HTF5580X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userCode = localStorage.getItem("userCode");
    const userName = localStorage.getItem("userName");

    if (!userCode) {
      window.location.href = "index.html";
    }

    let barChart = null;
    let pieChart = null;

    window.addEventListener("load", () => {
      document.getElementById("who").innerText = userName || userCode;
      loadCandidates();
      setupResults();
      checkVotingOpen();
    });

    function checkVotingOpen() {
      const openRef = ref(db, "votes/open");
      onValue(openRef, snap => {
        const open = !!snap.val();
        const msg = document.getElementById("voteMessage");
        const buttons = document.getElementById("candidates");
        if (!open) {
          msg.textContent = "Voting is currently closed.";
          buttons.style.display = "none";
        } else {
          msg.textContent = "";
          buttons.style.display = "block";
        }
      });
    }

    function loadCandidates() {
      const candRef = ref(db, "candidates");
      get(candRef).then(snap => {
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id => {
          const c = data[id];
          html += `<button class="btn" onclick="vote('${id}')">${c.name}</button>`;
        });
        document.getElementById("candidates").innerHTML = html || "<em>No candidates yet.</em>";
      });
    }

    window.vote = function (candidateId) {
      const msgEl = document.getElementById("voteMessage");
      const userVoteRef = ref(db, "votes/byUser/" + userCode);

      get(userVoteRef).then(snap => {
        if (snap.exists()) {
          msgEl.textContent = "You have already voted.";
          return;
        }

        set(userVoteRef, {
          candidate: candidateId,
          userName: userName || "",
          timestamp: Date.now()
        });

        const totalRef = ref(db, "votes/totals/" + candidateId);
        runTransaction(totalRef, (count) => (count || 0) + 1);

        msgEl.textContent = "Your vote has been recorded!";
      });
    }

    function setupResults() {
      const revealRef = ref(db, "votes/reveal");
      const totalsRef = ref(db, "votes/totals");
      const candRef = ref(db, "candidates");

      onValue(revealRef, snap => {
        const reveal = !!snap.val();
        const container = document.getElementById("publicResults");

        if (!reveal) {
          container.innerHTML = "<em>Results are hidden by the admin.</em>";
          hideCharts();
          return;
        }

        Promise.all([get(totalsRef), get(candRef)]).then(([totalsSnap, candSnap]) => {
          const totals = totalsSnap.val() || {};
          const cands = candSnap.val() || {};

          const labels = Object.keys(cands);
          const names = labels.map(id => cands[id].name);
          const values = labels.map(id => totals[id] || 0);

          let winner = "Tie";
          if (labels.length) {
            const maxVal = Math.max(...values);
            const winners = names.filter((_, i) => values[i] === maxVal);
            winner = winners.length === 1 ? winners[0] : "Tie";
          }

          container.innerHTML = `
            <h3>Results</h3>
            ${names.map((n, i) => `${n}: ${values[i]}`).join("<br>")}
            <br><br><strong>Winner: ${winner}</strong>
          `;

          drawSmallCharts(names, values);
        });
      });
    }

    function hideCharts() {
      document.getElementById("barChart").style.display = "none";
      document.getElementById("pieChart").style.display = "none";
    }

    function drawSmallCharts(labels, values) {
      const colors = ["#594F4F", "#547980", "#45ADA8", "#9DE0AD", "#E5FCC2"];

      const barCanvas = document.getElementById("barChart");
      const pieCanvas = document.getElementById("pieChart");
      barCanvas.style.display = "block";
      pieCanvas.style.display = "block";

      const barCtx = barCanvas.getContext("2d");
      const pieCtx = pieCanvas.getContext("2d");

      if (barChart) barChart.destroy();
      if (pieChart) pieChart.destroy();

      barChart = new Chart(barCtx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Votes",
            data: values,
            backgroundColor: labels.map((_, i) => colors[i % colors.length])
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });

      pieChart = new Chart(pieCtx, {
        type: "pie",
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: labels.map((_, i) => colors[i % colors.length])
          }]
        },
        options: {
          plugins: { legend: { position: "bottom" } }
        }
      });
    }

    window.backHome = function () {
      window.location.href = "home.html";
    }
  </script>
</head>
<body>

  <div class="top-bar">
    <div>Logged in as: <strong id="who"></strong></div>
    <div>
      <button class="btn" onclick="backHome()">Back to Home</button>
    </div>
  </div>

  <div class="section">
    <h2>Vote</h2>
    <div id="candidates"></div>
    <p id="voteMessage"></p>
  </div>

  <div class="section">
    <h2>Public Results</h2>
    <div id="publicResults"></div>
    <canvas id="barChart"></canvas>
    <canvas id="pieChart"></canvas>
  </div>

</body>
</html>
