<!DOCTYPE html>
<html>
<head>
  <title>Voting</title>
  <style>
    body { font-family:Arial; background:#E5FCC2; color:#594F4F; padding:20px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; background:#547980; color:#E5FCC2; padding:10px 15px; border-radius:8px; margin-bottom:20px; }
    .balance { font-weight:bold; }
    .btn { padding:6px 12px; border-radius:5px; border:none; cursor:pointer; background:#45ADA8; color:#594F4F; font-weight:bold; margin-left:4px; }
    .btn:hover { background:#9DE0AD; }
    .section { background:#F7FFF0; border-radius:8px; padding:15px; margin-bottom:20px; border:1px solid #9DE0AD; max-width:900px; margin:0 auto 20px auto; }
    table { border-collapse:collapse; width:100%; margin-top:10px; background:#FFFFFF; color:#594F4F; }
    th,td { border:1px solid #9DE0AD; padding:6px; text-align:left; }
    #votingAd img { max-width:100%; max-height:120px; border-radius:8px; display:block; margin:0 auto 10px auto; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>Logged in as: <strong id="who"></strong></div>
    <div class="balance">Balance: <span id="balance">£0.00</span></div>
    <div>
      <button class="btn" onclick="goHome()">Home</button>
      <button class="btn" onclick="goShop()">Shop</button>
    </div>
  </div>

  <div id="votingAd"></div>

  <div class="section">
    <h2>Candidates</h2>
    <div id="candidateList"></div>
  </div>

  <div class="section">
    <h2>Results</h2>
    <div id="results"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
      authDomain: "website-f6d0f.firebaseapp.com",
      databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "website-f6d0f",
      storageBucket: "website-f6d0f.appspot.com",
      messagingSenderId: "800099865387",
      appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
      measurementId: "G-G8HTF5580X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userCode = localStorage.getItem("userCode");
    const userName = localStorage.getItem("userName");
    if (!userCode) window.location.href = "index.html";

    async function loadUser() {
      const snap = await get(ref(db, "users/" + userCode));
      if (!snap.exists()) return;
      const u = snap.val();
      document.getElementById("who").innerText = u.name || userCode;
      document.getElementById("balance").innerText = "£" + (u.money || 0).toFixed(2);
    }

    setInterval(async () => {
      const snap = await get(ref(db, "users/" + userCode));
      if (!snap.exists()) return;
      const u = snap.val();
      document.getElementById("balance").innerText = "£" + (u.money || 0).toFixed(2);
    }, 2000);

    async function loadVoting() {
      const [candSnap, votesSnap] = await Promise.all([
        get(ref(db, "candidates")),
        get(ref(db, "votes"))
      ]);
      const cands = candSnap.val() || {};
      const votes = votesSnap.val() || { open:false, reveal:false, totals:{}, byUser:{} };

      const candidateList = document.getElementById("candidateList");
      const ids = Object.keys(cands);
      if (!ids.length) {
        candidateList.innerHTML = "<em>No candidates.</em>";
      } else {
        let html = "<table><tr><th>Name</th><th>Action</th></tr>";
        ids.forEach(id => {
          const c = cands[id];
          html += `<tr><td>${c.name}</td><td>${votes.open ? `<button onclick="vote('${id}')">Vote</button>` : "Voting closed"}</td></tr>`;
        });
        html += "</table>";
        candidateList.innerHTML = html;
      }

      const resultsDiv = document.getElementById("results");
      if (!votes.reveal || !votes.totals) {
        resultsDiv.innerHTML = "<em>Results hidden.</em>";
      } else {
        const totals = votes.totals;
        let html = "";
        Object.keys(cands).forEach(id => {
          html += `<div>${cands[id].name}: ${totals[id] || 0}</div>`;
        });
        resultsDiv.innerHTML = html || "<em>No votes yet.</em>";
      }
    }

    window.vote = async function (candidateId) {
      const votesRef = ref(db, "votes");
      const snap = await get(votesRef);
      const data = snap.val() || { open:false, reveal:false, totals:{}, byUser:{} };
      if (!data.open) {
        alert("Voting is closed.");
        return;
      }
      if (data.byUser && data.byUser[userCode]) {
        alert("You already voted.");
        return;
      }
      const totals = data.totals || {};
      totals[candidateId] = (totals[candidateId] || 0) + 1;
      const byUser = data.byUser || {};
      byUser[userCode] = {
        candidate: candidateId,
        userName: userName || "",
        timestamp: Date.now()
      };
      await set(votesRef, {
        open: data.open,
        reveal: data.reveal,
        totals,
        byUser
      });
      alert("Vote recorded.");
      loadVoting();
    };

    async function loadVotingAd() {
      const snap = await get(ref(db, "ads/voting"));
      const ad = snap.val();
      const container = document.getElementById("votingAd");
      if (!ad || !ad.imageUrl || !ad.expiresAt || ad.expiresAt < Date.now()) {
        container.innerHTML = "";
        return;
      }
      container.innerHTML = `<img src="${ad.imageUrl}" alt="Ad">`;
    }

    window.goHome = () => window.location.href = "home.html";
    window.goShop = () => window.location.href = "shop.html";

    window.addEventListener("load", async () => {
      await loadUser();
      await loadVoting();
      await loadVotingAd();
    });
  </script>
</body>
</html>
