<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer; }
        #message { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<h1>Vote for a Candidate</h1>
<p>Your vote is anonymous.</p>

<button onclick="vote('Max')">Max</button>
<button onclick="vote('Ben')">Ben</button>
<button onclick="vote('Dom')">Dom</button>

<p id="message"></p>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
        authDomain: "website-f6d0f.firebaseapp.com",
        databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "website-f6d0f",
        storageBucket: "website-f6d0f.appspot.com",
        messagingSenderId: "800099865387",
        appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
        measurementId: "G-G8HTF5580X"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function vote(name) {
        db.ref("votes/" + name).transaction(count => {
            return (count || 0) + 1;
        });

        document.getElementById("message").innerText = "Your vote has been recorded!";
    }
</script>

</body>
</html>
