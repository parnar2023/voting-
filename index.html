<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; background:#E5FCC2; color:#594F4F; text-align:center; padding:40px; }
    select, button { padding:8px; margin:6px; border-radius:5px; border:1px solid #9DE0AD; }
    button { background:#45ADA8; color:#594F4F; font-weight:bold; cursor:pointer; }
    button:hover { background:#9DE0AD; }
  </style>
</head>
<body>
  <h1>Login</h1>
  <p>Select your user:</p>
  <select id="userSelect"></select><br>
  <button onclick="login()">Continue</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
      authDomain: "website-f6d0f.firebaseapp.com",
      databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "website-f6d0f",
      storageBucket: "website-f6d0f.appspot.com",
      messagingSenderId: "800099865387",
      appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
      measurementId: "G-G8HTF5580X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function loadUsers() {
      const snap = await get(ref(db, "users"));
      const data = snap.val() || {};
      const sel = document.getElementById("userSelect");
      sel.innerHTML = "";
      Object.keys(data).forEach(code => {
        const u = data[code];
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = `${u.name || code} (${code})`;
        sel.appendChild(opt);
      });
    }

    window.login = async function () {
      const code = document.getElementById("userSelect").value;
      if (!code) return;
      const snap = await get(ref(db, "users/" + code));
      if (!snap.exists()) return;
      const u = snap.val();
      localStorage.setItem("userCode", code);
      localStorage.setItem("userName", u.name || "");
      localStorage.setItem("isAdmin", u.isAdmin ? "true" : "false");
      window.location.href = "home.html";
    };

    window.addEventListener("load", loadUsers);
  </script>
</body>
</html>
