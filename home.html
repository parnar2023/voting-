<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #E5FCC2;
      color: #594F4F;
      padding: 20px;
    }
    h1, h2 { text-align: center; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #547980;
      color: #E5FCC2;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .balance {
      font-weight: bold;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      background: #45ADA8;
      color: #594F4F;
      font-weight: bold;
      margin-left: 4px;
    }
    .btn:hover { background: #9DE0AD; }
    .section {
      background: #F7FFF0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #9DE0AD;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    textarea, input {
      width: 100%;
      max-width: 600px;
      padding: 6px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #9DE0AD;
    }
    #announcements, #chatMessages {
      border: 1px solid #9DE0AD;
      padding: 10px;
      border-radius: 5px;
      max-height: 250px;
      overflow-y: auto;
      background: #FFFFFF;
    }
    small { color: #547980; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      background: #FFFFFF;
      color: #594F4F;
    }
    th, td {
      border: 1px solid #9DE0AD;
      padding: 6px;
      text-align: left;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, get, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
      authDomain: "website-f6d0f.firebaseapp.com",
      databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "website-f6d0f",
      storageBucket: "website-f6d0f.appspot.com",
      messagingSenderId: "800099865387",
      appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
      measurementId: "G-G8HTF5580X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userCode = localStorage.getItem("userCode");
    const userName = localStorage.getItem("userName");
    const isAdmin = localStorage.getItem("isAdmin") === "true";

    if (!userCode) {
      window.location.href = "index.html";
    }

    function todayString() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    async function applyDailyIncome() {
      const userRef = ref(db, "users/" + userCode);
      const snap = await get(userRef);
      if (!snap.exists()) return;
      const user = snap.val();

      const lastPaid = user.lastPaidDate || "";
      const today = todayString();
      let money = user.money || 0;
      const dailyPay = user.dailyPay || 0;

      if (lastPaid !== today) {
        money += dailyPay;
        await update(userRef, {
          money,
          lastPaidDate: today
        });
      }

      document.getElementById("who").innerText = user.name || userCode;
      document.getElementById("balance").innerText =
        "£" + (money.toFixed ? money.toFixed(2) : money);
    }

    window.addEventListener("load", () => {
      applyDailyIncome().then(() => {
        if (!isAdmin) {
          document.getElementById("adminAnnouncementForm").style.display = "none";
        }
        loadAnnouncements();
        subscribeChat();
        loadLeaderboard();
      });
    });

    // Announcements
    function loadAnnouncements() {
      const annRef = ref(db, "announcements");
      onValue(annRef, snap => {
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id => {
          const a = data[id];
          html += `<div>
            <strong>${a.text}</strong><br>
            <small>By ${a.createdByName || a.createdBy} at ${new Date(a.createdAt).toLocaleString()}</small>
          </div><hr>`;
        });
        document.getElementById("announcements").innerHTML =
          html || "<em>No announcements yet.</em>";
      });
    }

    window.addAnnouncement = function () {
      const text = document.getElementById("announcementText").value.trim();
      if (!text) return;
      const annRef = ref(db, "announcements");
      const newRef = push(annRef);
      set(newRef, {
        text,
        createdBy: userCode,
        createdByName: userName || "",
        createdAt: Date.now()
      }).then(() => {
        document.getElementById("announcementText").value = "";
      });
    }

    // Chat
    function subscribeChat() {
      const chatRef = ref(db, "chat");
      onValue(chatRef, snap => {
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id => {
          const m = data[id];
          html += `<div>
            <strong>${m.userName || m.userCode}:</strong> ${m.text}
            <br><small>${new Date(m.timestamp).toLocaleString()}</small>
          </div><hr>`;
        });
        document.getElementById("chatMessages").innerHTML =
          html || "<em>No messages yet.</em>";
      });
    }

    window.sendMessage = function () {
      const text = document.getElementById("chatInput").value.trim();
      if (!text) return;
      const chatRef = ref(db, "chat");
      const newRef = push(chatRef);
      set(newRef, {
        text,
        userCode,
        userName: userName || "",
        timestamp: Date.now()
      }).then(() => {
        document.getElementById("chatInput").value = "";
      });
    }

    // Leaderboard (top 10 by money)
    async function loadLeaderboard() {
      const usersRef = ref(db, "users");
      const snap = await get(usersRef);
      const data = snap.val() || {};
      const arr = Object.keys(data).map(code => {
        const u = data[code];
        return {
          code,
          name: u.name || code,
          job: u.job || "",
          money: u.money || 0
        };
      });

      arr.sort((a, b) => (b.money || 0) - (a.money || 0));
      const top10 = arr.slice(0, 10);

      let html = "<table><tr><th>Rank</th><th>Name</th><th>Job</th><th>Money</th></tr>";
      top10.forEach((u, i) => {
        html += `<tr>
          <td>${i + 1}</td>
          <td>${u.name}</td>
          <td>${u.job}</td>
          <td>£${(u.money.toFixed ? u.money.toFixed(2) : u.money)}</td>
        </tr>`;
      });
      html += "</table>";

      document.getElementById("leaderboard").innerHTML =
        top10.length ? html : "<em>No users yet.</em>";
    }

    // Navigation
    window.goToVoting = function () {
      window.location.href = "voting.html";
    }

    window.goToShop = function () {
      window.location.href = "shop.html";
    }

    window.logout = function () {
      localStorage.clear();
      window.location.href = "index.html";
    }
  </script>
</head>
<body>

  <div class="top-bar">
    <div>
      Logged in as: <strong id="who"></strong>
    </div>
    <div class="balance">
      Balance: <span id="balance">£0.00</span>
    </div>
    <div>
      <button class="btn" onclick="goToVoting()">Go to Voting</button>
      <button class="btn" onclick="goToShop()">Shop & Inventory</button>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="section">
    <h2>Announcements</h2>
    <div id="announcements"></div>

    <div id="adminAnnouncementForm">
      <h3>Add announcement (admin only)</h3>
      <textarea id="announcementText" placeholder="Announcement text"></textarea><br>
      <button class="btn" onclick="addAnnouncement()">Add Announcement</button>
    </div>
  </div>

  <div class="section">
    <h2>Chat</h2>
    <div id="chatMessages"></div>
    <textarea id="chatInput" placeholder="Type a message"></textarea><br>
    <button class="btn" onclick="sendMessage()">Send</button>
  </div>

  <div class="section">
    <h2>Top 10 Richest Users</h2>
    <div id="leaderboard"></div>
  </div>

</body>
</html>
