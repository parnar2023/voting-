<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>
  <style>
    body { font-family:Arial; background:#E5FCC2; color:#594F4F; padding:20px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; background:#547980; color:#E5FCC2; padding:10px 15px; border-radius:8px; margin-bottom:20px; }
    .balance { font-weight:bold; }
    .btn { padding:6px 12px; border-radius:5px; border:none; cursor:pointer; background:#45ADA8; color:#594F4F; font-weight:bold; margin-left:4px; }
    .btn:hover { background:#9DE0AD; }
    .section { background:#F7FFF0; border-radius:8px; padding:15px; margin-bottom:20px; border:1px solid #9DE0AD; max-width:900px; margin:0 auto 20px auto; }
    .slotBox { border:1px solid #9DE0AD; padding:10px; border-radius:8px; margin-bottom:15px; background:#FFFFFF; }
    input[type=text] { width:100%; padding:6px; margin-top:8px; border-radius:5px; border:1px solid #9DE0AD; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div>Logged in as: <strong id="who"></strong></div>
    <div class="balance">Balance: <span id="balance">£0.00</span></div>
    <div>
      <button class="btn" onclick="goHome()">Home</button>
      <button class="btn" onclick="goVoting()">Voting</button>
    </div>
  </div>

  <div class="section">
    <h2>Buy Advertising Slots</h2>
    <div id="slots"></div>
  </div>

  <div class="section">
    <h2>Chests</h2>
    <button class="btn" onclick="buyChest()">Buy Chest (£500)</button>
    <button class="btn" onclick="openInventory()">My Effects</button>
    <div id="chestResult"></div>
    <div id="inventory"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { 
  getDatabase, ref, get, set, update 
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
  authDomain: "website-f6d0f.firebaseapp.com",
  databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "website-f6d0f",
  storageBucket: "website-f6d0f.appspot.com",
  messagingSenderId: "800099865387",
  appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
  measurementId: "G-G8HTF5580X"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const userCode = localStorage.getItem("userCode");
const userName = localStorage.getItem("userName");
if (!userCode) window.location.href = "index.html";

async function loadUser() {
  const snap = await get(ref(db, "users/" + userCode));
  if (!snap.exists()) return;
  const u = snap.val();
  document.getElementById("who").innerText = u.name || userCode;
  document.getElementById("balance").innerText = "£" + (u.money || 0).toFixed(2);
}

setInterval(async () => {
  const snap = await get(ref(db, "users/" + userCode));
  if (!snap.exists()) return;
  const u = snap.val();
  document.getElementById("balance").innerText = "£" + (u.money || 0).toFixed(2);
}, 2000);

const slotNames = {
  homepage: "Homepage Banner",
  sidebar: "Sidebar Banner",
  chatPin: "Chat Pinned Banner",
  voting: "Voting Page Banner"
};

async function loadSlots() {
  const container = document.getElementById("slots");
  container.innerHTML = "";

  for (const slot in slotNames) {
    const snap = await get(ref(db, "ads/" + slot));
    const ad = snap.val();
    let price = 1;
    let owner = "Available";
    let expires = "";
    let expired = true;

    if (ad && ad.expiresAt > Date.now()) {
      price = 2;
      owner = ad.owner;
      expires = new Date(ad.expiresAt).toLocaleString();
      expired = false;
    }

    const box = document.createElement("div");
    box.className = "slotBox";

    box.innerHTML = `
      <h3>${slotNames[slot]}</h3>
      <div><strong>Owner:</strong> ${owner}</div>
      <div><strong>Price:</strong> £${price}</div>
      ${expired ? "" : `<div><strong>Expires:</strong> ${expires}</div>`}
      <input type="text" id="url_${slot}" placeholder="Paste image URL (PNG/JPG/GIF)">
      <button class="btn" onclick="buySlot('${slot}')">Buy</button>
    `;

    container.appendChild(box);
  }
}

window.buySlot = async function(slotName) {
  const urlInput = document.getElementById("url_" + slotName);
  const imageUrl = urlInput.value.trim();

  if (!imageUrl) return alert("Please paste an image URL.");
  if (!imageUrl.startsWith("http")) return alert("Invalid URL.");

  const userSnap = await get(ref(db, "users/" + userCode));
  const user = userSnap.val();
  let money = user.money || 0;

  const adSnap = await get(ref(db, "ads/" + slotName));
  const ad = adSnap.val();

  let price = 1;
  if (ad && ad.expiresAt > Date.now()) price = 2;

  if (money < price) return alert("Not enough money.");

  await update(ref(db, "users/" + userCode), { money: money - price });

  await set(ref(db, "ads/" + slotName), {
    imageUrl,
    owner: userCode,
    purchasedAt: Date.now(),
    expiresAt: Date.now() + 86400000,
    pricePaid: price
  });

  alert("Ad purchased!");
  loadSlots();
};


// -------------------------
// CHEST SYSTEM
// -------------------------
window.buyChest = async function () {
  const userRef = ref(db, "users/" + userCode);
  const snap = await get(userRef);
  const user = snap.val();

  if (!user) return alert("User not found.");
  if ((user.money || 0) < 500) return alert("Not enough money.");

  await update(userRef, { money: user.money - 500 });

  const rewards = [
    { id: "rainbowWave", chance: 0.4 },
    { id: "fireGlow", chance: 0.3 },
    { id: "neonPulse", chance: 0.3 },
    { id: "gold", chance: 4 },
    { id: "blue", chance: 10 },
    { id: "green", chance: 20 },
    { id: "grey", chance: 65 }
  ];

  let roll = Math.random() * 100;
  let cumulative = 0;
  let reward = "grey";

  for (const r of rewards) {
    cumulative += r.chance;
    if (roll <= cumulative) {
      reward = r.id;
      break;
    }
  }

  await update(ref(db, "users/" + userCode + "/effects"), {
    [reward]: true
  });

  document.getElementById("chestResult").innerHTML =
    `<h3>You got: <strong>${reward.toUpperCase()}</strong>!</h3>`;
};

window.openInventory = async function () {
  const snap = await get(ref(db, "users/" + userCode + "/effects"));
  const effects = snap.val() || {};

  let html = "<h3>Your Effects</h3>";

  const names = {
    rainbowWave: "Rainbow Wave (Animated)",
    fireGlow: "Fire Glow (Animated)",
    neonPulse: "Neon Pulse (Animated)",
    gold: "Gold Chat",
    blue: "Blue Chat",
    green: "Green Chat",
    grey: "Grey Chat"
  };

  const sellPrices = {
    rainbowWave: 400,
    fireGlow: 350,
    neonPulse: 350,
    gold: 200,
    blue: 100,
    green: 50,
    grey: 20
  };

  Object.keys(effects).forEach(id => {
    html += `
      <div style="margin-bottom:10px;">
        <strong>${names[id]}</strong>
        <button class="btn" onclick="equipEffect('${id}')">Equip</button>
        <button class="btn" onclick="sellEffect('${id}', ${sellPrices[id]})">Sell (£${sellPrices[id]})</button>
      </div>
    `;
  });

  if (Object.keys(effects).length === 0) {
    html += "<em>You have no effects.</em>";
  }

  document.getElementById("inventory").innerHTML = html;
};

window.equipEffect = async function (effectId) {
  await update(ref(db, "users/" + userCode), {
    equippedEffect: effectId
  });

  alert("Equipped: " + effectId.toUpperCase());
};

window.sellEffect = async function (effectId, price) {
  const userRef = ref(db, "users/" + userCode);
  const snap = await get(userRef);
  const user = snap.val();

  if (!user.effects || !user.effects[effectId])
    return alert("You don't own this effect.");

  await update(ref(db, "users/" + userCode + "/effects"), {
    [effectId]: null
  });

  await update(userRef, {
    money: (user.money || 0) + price
  });

  alert("Sold for £" + price);
  openInventory();
};

window.goHome = () => window.location.href = "home.html";
window.goVoting = () => window.location.href = "voting.html";

window.addEventListener("load", async () => {
  await loadUser();
  await loadSlots();
});
</script>

</body>
</html>
