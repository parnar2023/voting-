<!DOCTYPE html>
<html>
<head>
  <title>Shop & Inventory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #E5FCC2;
      color: #594F4F;
      padding: 20px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #547980;
      color: #E5FCC2;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .balance { font-weight: bold; }
    .btn {
      padding: 6px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      background: #45ADA8;
      color: #594F4F;
      font-weight: bold;
      margin: 2px;
    }
    .btn:hover { background: #9DE0AD; }
    .section {
      background: #F7FFF0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #9DE0AD;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    h2 { margin-top: 0; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      background: #FFFFFF;
      color: #594F4F;
    }
    th, td {
      border: 1px solid #9DE0AD;
      padding: 6px;
      text-align: left;
    }
    .rarity-common { color: #594F4F; }
    .rarity-uncommon { color: #547980; }
    .rarity-rare { color: #45ADA8; }
    .rarity-epic { color: #9DE0AD; font-weight: bold; }
    .rarity-legendary { color: #E5FCC2; font-weight: bold; background:#594F4F; padding:2px 4px; border-radius:4px; }
    #message { margin-top: 10px; font-weight: bold; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
      authDomain: "website-f6d0f.firebaseapp.com",
      databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "website-f6d0f",
      storageBucket: "website-f6d0f.appspot.com",
      messagingSenderId: "800099865387",
      appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
      measurementId: "G-G8HTF5580X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userCode = localStorage.getItem("userCode");
    if (!userCode) {
      window.location.href = "index.html";
    }

    let userData = null;
    let itemsData = {};
    let chestsData = {};

    async function loadUser() {
      const userRef = ref(db, "users/" + userCode);
      const snap = await get(userRef);
      if (!snap.exists()) return;
      userData = snap.val();
      document.getElementById("who").innerText = userData.name || userCode;
      updateBalanceDisplay();
    }

    function updateBalanceDisplay() {
      const money = userData?.money || 0;
      document.getElementById("balance").innerText = "£" + (money.toFixed ? money.toFixed(2) : money);
    }

    async function loadItemsAndChests() {
      const itemsSnap = await get(ref(db, "items"));
      itemsData = itemsSnap.val() || {};
      const chestsSnap = await get(ref(db, "chests"));
      chestsData = chestsSnap.val() || {};
      renderChests();
      renderInventory();
    }

    function rarityClass(r) {
      if (!r) return "";
      r = r.toLowerCase();
      if (r === "common") return "rarity-common";
      if (r === "uncommon") return "rarity-uncommon";
      if (r === "rare") return "rarity-rare";
      if (r === "epic") return "rarity-epic";
      if (r === "legendary") return "rarity-legendary";
      return "";
    }

    function setMessage(msg) {
      document.getElementById("message").innerText = msg;
    }

    function renderChests() {
      const container = document.getElementById("chestList");
      const keys = Object.keys(chestsData);
      if (!keys.length) {
        container.innerHTML = "<em>No chests configured.</em>";
        return;
      }
      let html = "<table><tr><th>Name</th><th>Price</th><th>Action</th></tr>";
      keys.forEach(id => {
        const c = chestsData[id];
        html += `<tr>
          <td>${c.name || id}</td>
          <td>£${(c.price || 0).toFixed ? c.price.toFixed(2) : c.price || 0}</td>
          <td><button class="btn" onclick="buyChest('${id}')">Buy & Open</button></td>
        </tr>`;
      });
      html += "</table>";
      container.innerHTML = html;
    }

    function renderInventory() {
      const container = document.getElementById("inventoryList");
      const inv = (userData && userData.inventory) || {};
      const ids = Object.keys(inv);
      if (!ids.length) {
        container.innerHTML = "<em>You have no items yet.</em>";
        return;
      }
      let html = "<table><tr><th>Name</th><th>Rarity</th><th>Type</th><th>Sell for</th><th>Action</th></tr>";
      ids.forEach(itemId => {
        const item = itemsData[itemId];
        if (!item) return;
        const cls = rarityClass(item.rarity);
        const sellValue = item.sellValue || 0;
        html += `<tr>
          <td class="${cls}">${item.name}</td>
          <td>${item.rarity || ""}</td>
          <td>${item.type || ""}</td>
          <td>£${(sellValue.toFixed ? sellValue.toFixed(2) : sellValue)}</td>
          <td><button class="btn" onclick="sellItem('${itemId}')">Sell</button></td>
        </tr>`;
      });
      html += "</table>";
      container.innerHTML = html;
    }

    async function buyChest(chestId) {
      setMessage("");
      const chest = chestsData[chestId];
      if (!chest) {
        setMessage("Chest not found.");
        return;
      }
      const price = chest.price || 0;
      const money = userData.money || 0;
      if (money < price) {
        setMessage("Not enough money to buy this chest.");
        return;
      }

      // pick random item from drops
      const drops = chest.drops || [];
      if (!drops.length) {
        setMessage("This chest has no items configured.");
        return;
      }
      const randomIndex = Math.floor(Math.random() * drops.length);
      const itemId = drops[randomIndex];
      const item = itemsData[itemId];
      if (!item) {
        setMessage("Chest gave an invalid item.");
        return;
      }

      // update user: subtract money, add item to inventory
      const newMoney = money - price;
      const inv = userData.inventory || {};
      inv[itemId] = true;

      await update(ref(db, "users/" + userCode), {
        money: newMoney,
        inventory: inv
      });

      userData.money = newMoney;
      userData.inventory = inv;
      updateBalanceDisplay();
      renderInventory();
      setMessage("You opened a chest and got: " + item.name + " (" + (item.rarity || "unknown") + ")");
    }

    async function sellItem(itemId) {
      setMessage("");
      const item = itemsData[itemId];
      if (!item) {
        setMessage("Item not found.");
        return;
      }
      const sellValue = item.sellValue || 0;
      const inv = userData.inventory || {};
      if (!inv[itemId]) {
        setMessage("You don't own this item.");
        return;
      }

      delete inv[itemId];
      const newMoney = (userData.money || 0) + sellValue;

      await update(ref(db, "users/" + userCode), {
        money: newMoney,
        inventory: inv
      });

      userData.money = newMoney;
      userData.inventory = inv;
      updateBalanceDisplay();
      renderInventory();
      setMessage("Sold " + item.name + " for £" + (sellValue.toFixed ? sellValue.toFixed(2) : sellValue));
    }

    window.addEventListener("load", async () => {
      await loadUser();
      await loadItemsAndChests();
    });

    window.backHome = function () {
      window.location.href = "home.html";
    }
  </script>
</head>
<body>

  <div class="top-bar">
    <div>Logged in as: <strong id="who"></strong></div>
    <div class="balance">Balance: <span id="balance">£0.00</span></div>
    <div>
      <button class="btn" onclick="backHome()">Back to Home</button>
    </div>
  </div>

  <div class="section">
    <h2>Chests</h2>
    <div id="chestList"></div>
  </div>

  <div class="section">
    <h2>Your Inventory</h2>
    <div id="inventoryList"></div>
  </div>

  <div class="section">
    <h2>Messages</h2>
    <div id="message"></div>
  </div>

</body>
</html>
