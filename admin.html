<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #594F4F;
      color: #E5FCC2;
      padding: 20px;
    }
    h1, h2 { text-align: center; }
    input, select {
      padding: 6px;
      margin: 4px;
      border-radius: 4px;
      border: 1px solid #9DE0AD;
    }
    button {
      padding: 6px 12px;
      margin: 4px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #45ADA8;
      color: #594F4F;
      font-weight: bold;
    }
    button:hover { background: #9DE0AD; }
    #loginSection { text-align: center; margin-top: 40px; }
    #adminSection { display: none; }
    .card {
      background: #547980;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      background: #E5FCC2;
      color: #594F4F;
    }
    th, td {
      border: 1px solid #9DE0AD;
      padding: 6px;
      text-align: left;
    }
    canvas {
      margin-top: 10px;
      background: #E5FCC2;
      border-radius: 8px;
      padding: 5px;
    }
  </style>
</head>
<body>

<h1>Admin Panel</h1>

<!-- LOGIN -->
<div id="loginSection">
  <input id="password" type="password" placeholder="Admin password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN CONTENT -->
<div id="adminSection">

  <!-- Voting Controls -->
  <div class="card">
    <h2>Voting Controls</h2>
    <button onclick="openVoting()">Open Voting</button>
    <button onclick="closeVoting()">Close Voting</button>
    <button onclick="revealResults()">Reveal Results</button>
    <button onclick="hideResults()">Hide Results</button>
    <button onclick="resetVotes()">Reset Votes</button>
  </div>

  <!-- Vote Summary -->
  <div class="card">
    <h2>Vote Summary</h2>
    <div id="summary"></div>
    <canvas id="barChart" width="400" height="200"></canvas>
    <canvas id="pieChart" width="400" height="200"></canvas>
  </div>

  <!-- Votes by User -->
  <div class="card">
    <h2>Votes by User</h2>
    <div id="votesByUser"></div>
  </div>

  <!-- Candidates -->
  <div class="card">
    <h2>Candidates</h2>
    <input id="newCandidateName" placeholder="Candidate name">
    <button onclick="addCandidate()">Add Candidate</button>
    <div id="candidateList"></div>
  </div>

  <!-- USERS -->
  <div class="card">
    <h2>Users (Job + Daily Pay + Money)</h2>

    <input id="newUserCode" placeholder="User code">
    <input id="newUserName" placeholder="Name">
    <input id="newUserJob" placeholder="Job">
    <input id="newUserDailyPay" type="number" step="0.01" placeholder="Daily pay">
    <input id="newUserMoney" type="number" step="0.01" placeholder="Starting money">

    <label>
      Admin?
      <select id="newUserIsAdmin">
        <option value="false">No</option>
        <option value="true">Yes</option>
      </select>
    </label>

    <button onclick="addUser()">Add / Update User</button>

    <div id="userList"></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
    authDomain: "website-f6d0f.firebaseapp.com",
    databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "website-f6d0f",
    storageBucket: "website-f6d0f.appspot.com",
    messagingSenderId: "800099865387",
    appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
    measurementId: "G-G8HTF5580X"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const ADMIN_PASSWORD = "1234"; // CHANGE THIS

  let barChart = null;
  let pieChart = null;

  // LOGIN
  window.login = function () {
    const input = document.getElementById("password").value;
    if (input !== ADMIN_PASSWORD) {
      alert("Wrong password");
      return;
    }
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("adminSection").style.display = "block";
    loadAll();
  }

  // LOAD EVERYTHING
  function loadAll() {
    loadSummary();
    loadVotesByUser();
    loadCandidates();
    loadUsers();
  }

  // SUMMARY
  function loadSummary() {
    const totalsRef = ref(db, "votes/totals");
    const candRef = ref(db, "candidates");

    Promise.all([get(totalsRef), get(candRef)]).then(([totalsSnap, candSnap]) => {
      const totals = totalsSnap.val() || {};
      const cands = candSnap.val() || {};

      const ids = Object.keys(cands);
      const names = ids.map(id => cands[id].name);
      const values = ids.map(id => totals[id] || 0);

      let winner = "Tie";
      if (ids.length) {
        const maxVal = Math.max(...values);
        const winners = names.filter((_, i) => values[i] === maxVal);
        winner = winners.length === 1 ? winners[0] : "Tie";
      }

      document.getElementById("summary").innerHTML =
        ids.length
          ? `${names.map((n, i) => `${n}: ${values[i]}`).join(" | ")}<br><strong>Winner: ${winner}</strong>`
          : "<em>No candidates yet.</em>";

      drawCharts(names, values);
    });
  }

  // CHARTS
  function drawCharts(labels, values) {
    const colors = ["#594F4F", "#547980", "#45ADA8", "#9DE0AD", "#E5FCC2"];

    const barCtx = document.getElementById("barChart").getContext("2d");
    const pieCtx = document.getElementById("pieChart").getContext("2d");

    if (barChart) barChart.destroy();
    if (pieChart) pieChart.destroy();

    barChart = new Chart(barCtx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Votes",
          data: values,
          backgroundColor: labels.map((_, i) => colors[i % colors.length])
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });

    pieChart = new Chart(pieCtx, {
      type: "pie",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: labels.map((_, i) => colors[i % colors.length])
        }]
      },
      options: {
        plugins: { legend: { position: "bottom" } }
      }
    });
  }

  // VOTING CONTROLS
  window.openVoting = () => update(ref(db, "votes"), { open: true }).then(() => alert("Voting opened."));
  window.closeVoting = () => update(ref(db, "votes"), { open: false }).then(() => alert("Voting closed."));
  window.revealResults = () => update(ref(db, "votes"), { reveal: true }).then(() => alert("Results revealed."));
  window.hideResults = () => update(ref(db, "votes"), { reveal: false }).then(() => alert("Results hidden."));

  window.resetVotes = function () {
    if (!confirm("Reset ALL votes?")) return;
    set(ref(db, "votes"), {
      totals: {},
      byUser: {},
      open: false,
      reveal: false
    }).then(() => {
      alert("Votes reset.");
      loadSummary();
      loadVotesByUser();
    });
  }

  // VOTES BY USER
  function loadVotesByUser() {
    const byUserRef = ref(db, "votes/byUser");
    get(byUserRef).then(snap => {
      const data = snap.val() || {};
      let html = "<table><tr><th>User</th><th>Name</th><th>Candidate</th><th>Time</th></tr>";
      Object.keys(data).forEach(code => {
        const v = data[code];
        html += `<tr>
          <td>${code}</td>
          <td>${v.userName || ""}</td>
          <td>${v.candidate}</td>
          <td>${new Date(v.timestamp).toLocaleString()}</td>
        </tr>`;
      });
      html += "</table>";
      document.getElementById("votesByUser").innerHTML = html;
    });
  }

  // CANDIDATES
  window.addCandidate = function () {
    const name = document.getElementById("newCandidateName").value.trim();
    if (!name) return;
    const id = name.replace(/\s+/g, "_") + "_" + Date.now();
    set(ref(db, "candidates/" + id), { name }).then(() => {
      document.getElementById("newCandidateName").value = "";
      loadCandidates();
      loadSummary();
    });
  }

  function loadCandidates() {
    const candRef = ref(db, "candidates");
    get(candRef).then(snap => {
      const data = snap.val() || {};
      let html = "<table><tr><th>Name</th><th>Action</th></tr>";
      Object.keys(data).forEach(id => {
        html += `<tr>
          <td>${data[id].name}</td>
          <td><button onclick="deleteCandidate('${id}')">Delete</button></td>
        </tr>`;
      });
      html += "</table>";
      document.getElementById("candidateList").innerHTML = html;
    });
  }

  window.deleteCandidate = function (id) {
    if (!confirm("Delete this candidate?")) return;
    remove(ref(db, "candidates/" + id)).then(() => {
      loadCandidates();
      loadSummary();
    });
  }

  // USERS
  window.addUser = function () {
    const code = document.getElementById("newUserCode").value.trim();
    const name = document.getElementById("newUserName").value.trim();
    const job = document.getElementById("newUserJob").value.trim();
    const dailyPay = parseFloat(document.getElementById("newUserDailyPay").value || "0");
    const money = parseFloat(document.getElementById("newUserMoney").value || "0");
    const isAdmin = document.getElementById("newUserIsAdmin").value === "true";

    if (!code || !name) {
      alert("User code and name required.");
      return;
    }

    set(ref(db, "users/" + code), {
      name,
      job,
      dailyPay,
      money,
      isAdmin
    }).then(() => {
      alert("User added/updated.");
      loadUsers();
    });
  }

  function loadUsers() {
    const usersRef = ref(db, "users");
    get(usersRef).then(snap => {
      const data = snap.val() || {};
      let html = "<table><tr><th>Code</th><th>Name</th><th>Job</th><th>Daily Pay</th><th>Money</th><th>Admin</th></tr>";
      Object.keys(data).forEach(code => {
        const u = data[code];
        html += `<tr>
          <td>${code}</td>
          <td>${u.name}</td>
          <td>${u.job}</td>
          <td>${u.dailyPay}</td>
          <td>${u.money}</td>
          <td>${u.isAdmin ? "Yes" : "No"}</td>
        </tr>`;
      });
      html += "</table>";
      document.getElementById("userList").innerHTML = html;
    });
  }

</script>

</body>
</html>
