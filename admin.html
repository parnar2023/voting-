<!DOCTYPE html>
<html>
<head>
    <title>Admin Results</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0T3pnUvMgrNjmbYbTnetaxjtWCb55Y7Y",
            authDomain: "website-f6d0f.firebaseapp.com",
            databaseURL: "https://website-f6d0f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "website-f6d0f",
            storageBucket: "website-f6d0f.appspot.com",
            messagingSenderId: "800099865387",
            appId: "1:800099865387:web:8430a2c3bddb071d236b6e",
            measurementId: "G-G8HTF5580X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ADMIN_PASSWORD = "1234"; // change this

        window.login = function() {
            const input = document.getElementById("password").value;

            if (input !== ADMIN_PASSWORD) {
                alert("Wrong password");
                return;
            }

            loadResults();
        }

        function loadResults() {
            const votesRef = ref(db, "votes");

            get(votesRef).then(snapshot => {
                const data = snapshot.val() || {};

                const max = data.Max || 0;
                const ben = data.Ben || 0;
                const dom = data.Dom || 0;

                let winner = "Tie";
                if (max > ben && max > dom) winner = "Max";
                if (ben > max && ben > dom) winner = "Ben";
                if (dom > max && dom > ben) winner = "Dom";

                document.getElementById("results").innerHTML = `
                    <h2>Results</h2>
                    Max: ${max}<br>
                    Ben: ${ben}<br>
                    Dom: ${dom}<br><br>
                    <strong>Winner: ${winner}</strong><br><br>
                    <button onclick="resetVotes()">Reset Votes</button>
                `;
            });
        }

        window.resetVotes = function() {
            if (!confirm("Are you sure you want to reset ALL votes?")) return;

            const votesRef = ref(db, "votes");

            set(votesRef, {
                Max: 0,
                Ben: 0,
                Dom: 0
            }).then(() => {
                alert("Votes reset!");
                loadResults();
            });
        }
    </script>

    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; }
        input { padding: 10px; font-size: 18px; }
        button { padding: 10px 20px; font-size: 18px; margin-top: 10px; cursor: pointer; }
        #results { margin-top: 30px; font-size: 22px; }
    </style>
</head>
<body>

<h1>Admin Login</h1>

<input id="password" type="password" placeholder="Enter admin password">
<button onclick="login()">Login</button>

<div id="results"></div>

</body>
</html>
